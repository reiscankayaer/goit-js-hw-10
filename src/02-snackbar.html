<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Görev 2 - Promise Üreteci</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <style>
      /* Forma biraz makyaj yapalım */
      .form { display: flex; flex-direction: column; gap: 16px; max-width: 300px; margin: 20px; font-family: sans-serif; }
      fieldset { display: flex; gap: 10px; padding: 10px; }
      button { padding: 8px 16px; cursor: pointer; }
    </style>
  </head>
  <body>
    <p><a href="index.html">Geri dön</a></p>

    <form class="form">
      <label>
        Delay (ms)
        <input type="number" name="delay" required />
      </label>

      <fieldset>
        <legend>State</legend>
        <label>
          <input type="radio" name="state" value="fulfilled" required />
          Fulfilled
        </label>
        <label>
          <input type="radio" name="state" value="rejected" required />
          Rejected
        </label>
      </fieldset>

      <button type="submit">Create notification</button>
    </form>

    <script type="module" src="./js/02-snackbar.js"></script>
  </body>
</html>
